name: myapp
description: "A new Flutter project."
publish_to: 'none'
version: 1.0.62+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter
  
  # UI 相關
  device_preview: ^1.1.0
  cupertino_icons: ^1.0.8

  # AI 核心
  google_generative_ai: ^0.4.6 

  # 錄音與播放
  record: ^6.0.0
  audioplayers: ^6.0.0
  wakelock_plus: ^1.1.4  # 新增這個，用來防止錄音時螢幕休眠
  flutter_foreground_task: ^6.4.0  # 💡 新增：用來建立系統前台服務，徹底綁定麥克風
  audio_session: ^0.1.21  # 💡 新增：用來管理音訊焦點，允許與 YouTube 共存
  
  # 檔案與儲存
  path_provider: ^2.1.2
  permission_handler: ^11.3.0
  shared_preferences: ^2.2.2
  file_picker: ^8.0.0
  
  # 工具
  intl: ^0.20.2             
  uuid: ^4.3.3
  share_plus: ^10.0.0
  http: ^1.2.0

  # PDF 與列印
  pdf: ^3.10.0
  printing: ^5.11.0
  
  # YouTube
  youtube_explode_dart: ^3.0.5
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  # 新增：用於生成 APP ICON
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true

# 新增：ICON 設定 (請確保 assets/app_icon.png 存在，或修改 image_path)
flutter_launcher_icons:
  android: "ic_launcher"
  ios: false                 # 若您後續需要打包 iOS 版本，請記得將此處改為 true
  image_path: "assets/app_icon.png" # 👈 修改這裡，指向您剛放入的圖片路徑
  # --- 新增以下兩行：設定 Android 自適應圖示 ---
  adaptive_icon_background: "#1E88E5" # 👈 請替換為您設計圖邊緣的主要底色 (Hex色碼)
  adaptive_icon_foreground: "assets/app_icon.png"
  min_sdk_android: 21